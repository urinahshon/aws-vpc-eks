apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sentinel-backend
  annotations:
    # Internal NLB — not reachable from the internet.
    # NLBs preserve the client source IP end-to-end, which makes NetworkPolicy
    # ipBlock rules accurate and avoids the CLB source-IP masquerade problem.
    # NLBs also expose per-AZ static IPs that can be referenced in SG rules.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    # Spread traffic across both AZs regardless of which AZ the NLB node is in.
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # NLB health-check uses the same port as the service.
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
  labels:
    app: backend
spec:
  type: LoadBalancer
  # externalTrafficPolicy: Local preserves the real source IP on the node.
  # Combined with the NLB, backend pods see the actual gateway node IP.
  externalTrafficPolicy: Local
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP