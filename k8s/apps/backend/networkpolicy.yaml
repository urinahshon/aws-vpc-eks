apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sentinel-backend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway-subnets
  namespace: sentinel-backend
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.10.0/24
        - ipBlock:
            cidr: 10.0.11.0/24
      ports:
        - protocol: TCP
          port: 80
---
# NLB health-check probes originate from the NLB interface IPs inside the
# backend private subnets.  With externalTrafficPolicy: Local the node does
# NOT SNAT the source, so backend pods see the raw NLB IP.  Without this
# policy the health checks are dropped by the pod-level firewall and the NLB
# marks every target unhealthy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nlb-healthchecks
  namespace: sentinel-backend
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.1.10.0/24
        - ipBlock:
            cidr: 10.1.11.0/24
      ports:
        - protocol: TCP
          port: 80