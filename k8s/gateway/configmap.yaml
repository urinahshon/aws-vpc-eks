# BACKEND_HOST is replaced at deploy time by the CI/CD pipeline with
# the DNS hostname of the internal Load Balancer fronting eks-backend.
# See .github/workflows/deploy.yml — the k8s-deploy job.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: sentinel-gateway
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream backend {
            server BACKEND_HOST:80;
            keepalive 32;
        }

        server {
            listen 80;
            server_name _;

            location /health {
                return 200 "gateway-ok\n";
                add_header Content-Type text/plain;
            }

            location / {
                proxy_pass         http://backend;
                proxy_http_version 1.1;
                proxy_set_header   Connection        "";
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_connect_timeout 5s;
                proxy_read_timeout    30s;
            }
        }
    }