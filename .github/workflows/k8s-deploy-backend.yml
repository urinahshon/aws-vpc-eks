name: K8s Deploy — Backend

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION:      ${{ vars.AWS_REGION || 'us-west-1' }}
  BACKEND_CLUSTER: eks-backend

jobs:
  k8s-deploy-backend:
    name: Deploy backend workloads
    runs-on: [self-hosted, backend-vpc]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig (private endpoint)
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.BACKEND_CLUSTER }} \
            --region ${{ env.AWS_REGION }} --alias eks-backend
      - name: Inject backend IRSA role ARN
        run: |
          sed -i "s|BACKEND_IRSA_ROLE_ARN|${{ secrets.BACKEND_IRSA_ROLE_ARN }}|g" \
            k8s/backend/serviceaccount.yaml
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/backend/namespace.yaml       --context=eks-backend
          kubectl apply -f k8s/backend/serviceaccount.yaml  --context=eks-backend
          kubectl apply -f k8s/backend/networkpolicy.yaml   --context=eks-backend
          kubectl apply -f k8s/backend/configmap.yaml       --context=eks-backend
          kubectl apply -f k8s/backend/deployment.yaml      --context=eks-backend
          kubectl apply -f k8s/backend/service.yaml         --context=eks-backend
      - name: Wait for rollout
        run: kubectl rollout status deployment/backend -n sentinel-backend --context=eks-backend --timeout=300s
      - name: Export internal NLB hostname
        id: nlb
        run: |
          for i in $(seq 1 30); do
            H=$(kubectl get svc backend-service -n sentinel-backend --context=eks-backend \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$H" ] && { echo "hostname=$H" >> $GITHUB_OUTPUT; break; }
            sleep 10
          done
          [ -z "$H" ] && { echo "NLB hostname timeout"; exit 1; }
      - name: Upload NLB hostname artifact
        run: echo "${{ steps.nlb.outputs.hostname }}" > nlb-hostname.txt
      - uses: actions/upload-artifact@v4
        with:
          name: nlb-hostname
          path: nlb-hostname.txt
          retention-days: 1
    outputs:
      nlb_hostname: ${{ steps.nlb.outputs.hostname }}