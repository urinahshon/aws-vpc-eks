name: Terraform Deploy — Network Backend

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION:     ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_BACKEND_NET: terraform/environments/backend/network

jobs:
  apply:
    name: Apply backend/network
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_BACKEND_NET }}
        run: terraform init
      - name: Apply
        working-directory: ${{ env.TF_BACKEND_NET }}
        run: terraform apply -auto-approve -input=false