name: Terraform Deploy — Network Gateway

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION:     ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_GATEWAY_NET: terraform/environments/gateway/network

jobs:
  apply:
    name: Apply gateway/network
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_GATEWAY_NET }}
        run: terraform init
      - name: Apply
        working-directory: ${{ env.TF_GATEWAY_NET }}
        run: terraform apply -auto-approve -input=false

  peering:
    name: Apply peering
    runs-on: ubuntu-latest
    needs: [apply]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: terraform/environments/peering
        run: terraform init
      - name: Apply
        working-directory: terraform/environments/peering
        run: |
          terraform apply -auto-approve -input=false \
            -var="tf_state_bucket=aws-vpc-eks-tfstate-721500739616" \
            -var="gateway_state_key=environments/gateway/network/terraform.tfstate" \
            -var="backend_state_key=environments/backend/network/terraform.tfstate"