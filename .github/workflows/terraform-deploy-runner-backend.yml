name: Terraform Deploy — Backend Runner

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        type: choice
        options:
          - apply
          - destroy
        default: apply
      force_replace:
        description: "Recreate the runner instance (re-runs user data) — apply only"
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_DIR:     terraform/environments/backend/runner

jobs:
  apply:
    if: ${{ inputs.action == 'apply' }}
    name: Apply backend/runner
    runs-on: ubuntu-latest
    environment: backend-runner
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
      - name: Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          REPLACE_FLAG=""
          if [ "${{ inputs.force_replace }}" = "true" ]; then
            REPLACE_FLAG="-replace=aws_instance.runner"
          fi
          terraform apply -auto-approve -input=false $REPLACE_FLAG \
            -var="tf_state_bucket=aws-vpc-eks-tfstate-721500739616" \
            -var="github_pat=${{ secrets.GH_RUNNER_PAT }}"
      - name: Show runner instance ID
        working-directory: ${{ env.TF_DIR }}
        run: |
          ID=$(terraform output -raw runner_instance_id)
          echo "::notice::Runner instance: $ID"
          echo "::notice::SSM: aws ssm start-session --target $ID --region ${{ env.AWS_REGION }}"

  destroy:
    if: ${{ inputs.action == 'destroy' }}
    name: Destroy backend/runner
    runs-on: ubuntu-latest
    environment: backend-runner
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
      - name: Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve -input=false \
            -var="tf_state_bucket=aws-vpc-eks-tfstate-721500739616" \
            -var="github_pat=${{ secrets.GH_RUNNER_PAT }}"