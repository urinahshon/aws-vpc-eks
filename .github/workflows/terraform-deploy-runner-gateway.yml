name: Terraform Deploy — Gateway Runner

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        type: choice
        options:
          - apply
          - destroy
        default: apply
      force_replace:
        description: "Recreate the runner instance (re-runs user data) — apply only"
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_DIR:     terraform/environments/gateway/runner

jobs:
  apply:
    if: ${{ inputs.action == 'apply' }}
    name: Apply gateway/runner
    runs-on: ubuntu-latest
    environment: backend-runner
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
      - name: Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          REPLACE_FLAG=""
          if [ "${{ inputs.force_replace }}" = "true" ]; then
            REPLACE_FLAG="-replace=aws_instance.runner"
          fi
          terraform apply -auto-approve -input=false $REPLACE_FLAG \
            -var="tf_state_bucket=aws-vpc-eks-tfstate-721500739616" \
            -var="github_pat=${{ secrets.GH_RUNNER_PAT }}"
      - name: Show runner instance ID
        working-directory: ${{ env.TF_DIR }}
        run: |
          ID=$(terraform output -raw runner_instance_id)
          echo "::notice::Runner instance: $ID"
          echo "::notice::SSM: aws ssm start-session --target $ID --region ${{ env.AWS_REGION }}"
          echo "RUNNER_INSTANCE_ID=$ID" >> "$GITHUB_ENV"
      - name: Verify user-data via SSM
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          ID="$RUNNER_INSTANCE_ID"

          echo "Waiting for SSM agent to register on $ID..."
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$ID" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null || echo "None")
            [ "$STATUS" = "Online" ] && break
            echo "  attempt $i/20 — status: $STATUS"
            sleep 15
          done
          [ "$STATUS" = "Online" ] || { echo "::error::SSM agent never came online"; exit 1; }

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$ID" \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":["systemctl is-active actions.runner.*.service && echo OK || echo FAIL"]}' \
            --query "Command.CommandId" --output text)

          echo "Waiting for command $CMD_ID..."
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$ID"

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$ID" \
            --query "StandardOutputContent" --output text)
          echo "Runner service status: $RESULT"
          echo "$RESULT" | grep -q "^OK" || { echo "::error::Runner service not active"; exit 1; }

  destroy:
    if: ${{ inputs.action == 'destroy' }}
    name: Destroy gateway/runner
    runs-on: ubuntu-latest
    environment: backend-runner
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.15.4" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sentinel-github-actions-urinahshon
          aws-region: ${{ env.AWS_REGION }}
      - name: Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
      - name: Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve -input=false \
            -var="tf_state_bucket=aws-vpc-eks-tfstate-721500739616" \
            -var="github_pat=${{ secrets.GH_RUNNER_PAT }}"